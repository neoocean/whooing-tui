name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.13']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core + tui (editable, with dev deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e 'core[dev]' -e 'tui[dev]'

      # core / tui 는 별도 프로세스로 — 단일 프로세스 실행 시 클라이언트
      # 테스트가 cross-process 상태 오염으로 spurious 실패(약 45건). 패키지
      # 별 pyproject 의 [tool.pytest.ini_options] (asyncio_mode=auto) 도 각
      # 호출에서 정확히 적용된다.
      - name: core tests
        run: pytest -q core/tests

      - name: tui tests
        run: pytest -q tui/tests
